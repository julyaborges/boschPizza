<section class="page">
<div class="page-header">
<h2>Pizzas</h2>
<button (click)="newPizza()">Nova pizza</button>
</div>
<div *ngIf="loading">Carregando...</div>
<div class="table-wrapper" *ngIf="!loading">
<table>
<thead>
<tr>
<th>ID</th>
<th>Nome</th>
<th>Sem glúten</th>
<th>Ações</th>
</tr>
</thead>
<tbody>
<tr *ngFor="let pizza of pizzas">
<td>{{ pizza.id }}</td>
<td>{{ pizza.name }}</td>
<td>{{ pizza.isGlutenFree ? 'Sim' : 'Não' }}</td>
<td class="actions">
<button (click)="editPizza(pizza.id!)">Editar</button>
<button (click)="deletePizza(pizza.id!)">Excluir</button>
</td>
</tr>
</tbody>
</table>
</div>
</section>
