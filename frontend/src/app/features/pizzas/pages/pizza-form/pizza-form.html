<section class="page">
<div class="form-card">
<h2>{{ id ? 'Editar pizza' : 'Nova pizza' }}</h2>
<form [formGroup]="form" (ngSubmit)="save()">
<div class="field">
<label>Nome</label>
<input type="text" formControlName="name" placeholder="Digite o nome da pizza" />
</div>
<div class="checkbox-field">
<input id="isGlutenFree" type="checkbox" formControlName="isGlutenFree" />
<label for="isGlutenFree">Sem glúten</label>
</div>
<div class="actions">
<button type="submit">Salvar</button>
<button type="button" routerLink="/pizzas">Cancelar</button>
</div>
</form>
</div>
</section>
